services:
  type: web
  name: pdf-chat-rag-backend-docker
  env: docker
  plan: free
  dockerfilePath: ./Dockerfile
  healthCheckPath: /health
  autoDeploy: true
  
  envVars:
    - key: SUPABASE_URL
      sync: false
    - key: SUPABASE_SERVICE_ROLE_KEY
      sync: false
    - key: GROQ_API_KEY
      sync: false
    - key: OPENAI_API_KEY
      sync: false
    - key: TEST_MODE
      value: false
    - key: SIMILARITY_THRESHOLD
      value: 0.3
