services:
  type: web
  name: pdf-chat-rag-backend
  env: python
  plan: free
  buildCommand: pip install --upgrade pip && pip install -r requirements.txt
  startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
  healthCheckPath: /health
  autoDeploy: true
  
  envVars:
    - key: SUPABASE_URL
      sync: false
    - key: SUPABASE_SERVICE_ROLE_KEY
      sync: false
    - key: GROQ_API_KEY
      sync: false
    - key: OPENAI_API_KEY
      sync: false
    - key: TEST_MODE
      value: false
    - key: SIMILARITY_THRESHOLD
      value: 0.3
    - key: PYTHON_VERSION
      value: 3.11.9
